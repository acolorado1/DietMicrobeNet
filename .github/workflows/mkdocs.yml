name: Deploy Docs

on:
  push:
    tags:
      - "v*"   # triggers on any version tag like v1.0.0

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0   # mike needs full git history
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install mkdocs mkdocs-material mike
      - run: git config user.name "github-actions" && git config user.email "github-actions@github.com"
      - run: mike deploy --push --update-aliases ${{ github.ref_name }} latest