name: DietMicrobeNet
channels:
  - conda-forge
  - bioconda
  - nodefaults

dependencies:
  - python=3.13.9
  - streamlit=1.51.0
  - pandoc=3.8.3
  - coin-or-cbc=2.10.12
  - snakemake=9.14.0
  - tqdm=4.67.1
  - scikit-bio=0.7.1

  # R core
  - r-base=4.4.3

  # R tidyverse + core packages (ARM-compatible)
  - r-argparse=2.3.1
  - r-biocmanager=1.30.27
  - r-cairo=1.7_0
  - r-cowplot=1.2.0
  - r-data.table=1.17.8
  - r-devtools=2.4.6
  - r-dplyr=1.1.4
  - r-forcats=1.0.1
  - r-ggraph=2.2.1
  - r-ggplot2=4.0.1
  - r-ggpubr=0.6.2
  - r-ggrepel=0.9.6
  - r-igraph=2.1.4
  - r-jsonlite=2.0.0
  - r-patchwork=1.3.2
  - r-plotly=4.11.0
  - r-rcolorbrewer=1.1_3
  - r-readr=2.1.6
  - r-scales=1.4.0
  - r-stringr=1.6.0
  - r-thematic=0.1.8
  - r-tibble=3.3.0
  - r-tidyr=1.3.1
  - r-tidyverse=2.0.0

  # Bioconductor
  - bioconductor-clusterprofiler=4.14.0
  - bioconductor-keggrest=1.46.0
  - bioconductor-org.hs.eg.db=3.20.0

  # Python dependencies
  - pip
  - pip:
    - AMON-bio==1.1.0
    - lxml==6.0.2
    - networkx==3.6