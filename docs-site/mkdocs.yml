site_name: DietMicrobeNet
site_description: Creating metabolic networks to find what dietary originating compounds microbes are capable of metabolizing
site_url: https://acolorado1.github.io/DietMicrobeNet/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
  - Usage:
    - Running the Pipeline: usage.md
    - Inter-Sample Comparison: intersample_comp.md
    - Metabolome Comparison: metabolome_comp.md
  - Output:
    - Output Files: output.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
